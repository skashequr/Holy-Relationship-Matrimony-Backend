app = "holyrelationship-api"
primary_region = "sin"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"
  FRONTEND_URL = "https://hrmmm.vercel.app"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
